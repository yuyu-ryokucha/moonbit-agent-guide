name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [nightly, latest]
    name: test (${{ matrix.channel }})
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit (${{ matrix.channel }})
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s ${{ matrix.channel }}
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: moon version
        run: moon version --all

      - name: moon test moonbit-agent-guide/SKILL.mbt.md
        run: moon test moonbit-agent-guide/SKILL.mbt.md --warn-list -1-2-3-6-7-28-68 --deny-warn
